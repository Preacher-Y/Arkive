spring.application.name=backend
server.port = 9000

spring.datasource.url=jdbc:postgresql://localhost:5433/arkive_db
spring.datasource.username=postgres
spring.datasource.password=thug1crew
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Cookie auth defaults (dev-friendly for HTTP localhost)
app.auth.cookie.secure=false
app.auth.cookie.same-site=Lax
app.auth.cookie.domain=
app.auth.cookie.max-age-seconds=900

# CORS defaults for browser clients on localhost
app.cors.allowed-origins=http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=Content-Type,Authorization
app.cors.allow-credentials=true

# Must be overridden in production via APP_JWT_SECRET
app.jwt.secret=${APP_JWT_SECRET:dev-only-jwt-secret-change-me-please-1234567890}
